<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="カラオケ採点向けのリアルタイム音程トレーナー"
    />
    <title>Karaoke Pitch Trainer</title>
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Karaoke Pitch Trainer</p>
          <h1>音程採点トレーナー</h1>
        </div>
        <div class="status-pill" id="status">待機中</div>
      </header>

      <main class="workspace">
        <section class="control-panel" aria-label="セッション操作">
          <label class="field">
            <span>曲</span>
            <select id="song-select">
              <option value="doremi">ドレミ音階</option>
            </select>
          </label>

          <div class="control-group" aria-label="キー変更">
            <span class="control-label">キー</span>
            <div class="key-controls">
              <button id="octave-down-button" type="button" class="mini-button">-12</button>
              <button id="flat-button" type="button" class="mini-button">♭</button>
              <strong id="transpose-display" class="key-display">0</strong>
              <button id="sharp-button" type="button" class="mini-button">♯</button>
              <button id="octave-up-button" type="button" class="mini-button">+12</button>
            </div>
          </div>

          <div class="control-group" aria-label="自声表示">
            <span class="control-label">自声表示</span>
            <div class="segmented-control">
              <label>
                <input type="radio" name="pitch-display" value="continuous" checked />
                <span>連続</span>
              </label>
              <label>
                <input type="radio" name="pitch-display" value="discrete" />
                <span>離散</span>
              </label>
            </div>
          </div>

          <div class="control-group" aria-label="OK許容幅">
            <span class="control-label">OK幅</span>
            <div class="segmented-control">
              <label>
                <input type="radio" name="tolerance" value="10" />
                <span>±10</span>
              </label>
              <label>
                <input type="radio" name="tolerance" value="25" checked />
                <span>±25</span>
              </label>
              <label>
                <input type="radio" name="tolerance" value="40" />
                <span>±40</span>
              </label>
            </div>
          </div>

          <label class="toggle-row">
            <input id="guide-toggle" type="checkbox" checked />
            <span>ガイド音</span>
          </label>

          <div class="button-row">
            <button id="start-button" type="button" class="primary-button">
              マイクを許可して開始
            </button>
            <button id="stop-button" type="button" class="secondary-button" disabled>
              停止
            </button>
            <button id="retry-button" type="button" class="secondary-button" hidden>
              もう一度
            </button>
          </div>

          <div class="meter-grid" aria-label="採点">
            <div class="meter-box">
              <span class="meter-label">音程正確率</span>
              <strong id="pitch-score">--%</strong>
            </div>
            <div class="meter-box">
              <span class="meter-label">発声率</span>
              <strong id="voice-score">--%</strong>
            </div>
          </div>

          <div class="level-meter" aria-label="入力レベル">
            <span>入力レベル</span>
            <div class="level-track">
              <div id="input-level" class="level-fill"></div>
            </div>
          </div>
        </section>

        <section class="chart-panel" aria-label="音程バー">
          <canvas id="pitch-canvas"></canvas>
        </section>
      </main>
      <div id="countdown" class="countdown-overlay" aria-live="polite" hidden></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
